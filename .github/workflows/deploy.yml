name: Deploy EMI

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: [self-hosted, vps]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync files to deploy dir
        run: |
          mkdir -p /opt/apps/emi
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            ./ /opt/apps/emi/

      - name: Deploy
        run: |
          cd /opt/apps/emi
          docker compose --env-file .env up -d --build

      - name: Verificar salud
        run: |
          sleep 5
          docker ps | grep emi-app
          docker logs emi-app --tail 20
